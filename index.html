<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Milhar - Jogo do Bicho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <header>
                <h1>🍀 Calculadora de Milhar</h1>
                <p class="subtitle">Jogo do Bicho - Resultados com estilo</p>
            </header>
            
            <div class="input-section">
                <div class="date-input-group">
                    <label for="dataInput">📅 Selecione uma data:</label>
                    <input type="date" id="dataInput" required>
                </div>
                
                <button id="calcularBtn" class="calculate-btn">
                    <span class="btn-text">🎲 Calcular</span>
                    <span class="btn-icon">⚡</span>
                </button>
            </div>
            
            <div id="resultado" class="result-section hidden">
                <div class="result-card gradient-1">
                    <h3>🎯 Resultados</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <span class="label">📅 Data:</span>
                            <span id="dataOriginal" class="value"></span>
                        </div>
                        <div class="result-item">
                            <span class="label">🔢 Soma Original:</span>
                            <span id="somaOriginal" class="value"></span>
                        </div>
                        <div class="result-item">
                            <span class="label">🔄 Ano Invertido:</span>
                            <span id="anoInvertido" class="value"></span>
                        </div>
                        <div class="result-item">
                            <span class="label">➕ Soma Final:</span>
                            <span id="somaFinal" class="value"></span>
                        </div>
                        <div class="result-item milhar-item">
                            <span class="label">🥇 1ª Milhar:</span>
                            <span id="primeiraMilhar" class="value milhar-value"></span>
                        </div>
                        <div class="result-item milhar-item">
                            <span class="label">🥈 2ª Milhar:</span>
                            <span id="segundaMilhar" class="value milhar-value"></span>
                        </div>
                        <div class="result-item milhar-item">
                            <span class="label">🥉 3ª Milhar:</span>
                            <span id="terceiraMilhar" class="value milhar-value"></span>
                        </div>
                        <div class="result-item milhar-item highlight">
                            <span class="label">🏆 4ª Milhar:</span>
                            <span id="quartaMilhar" class="value milhar-value final-result"></span>
                        </div>
                        <div class="result-item highlight">
                            <span class="label">✨ Segunda Dezena:</span>
                            <span id="segundaDezena" class="value final-result"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="tabelaBicho" class="tabela-section hidden">
                <div class="tabela-bicho gradient-2">
                    <h4>🐾 Grupos do Jogo do Bicho</h4>
                    <table>
                        <thead>
                            <tr>
                                <th>🎖️ Prêmio</th>
                                <th>🔢 Número</th>
                                <th>📋 Grupo</th>
                                <th>🐄 Animal</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaCorpo">
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div id="erro" class="error-message hidden">
                <span class="error-icon">⚠️</span>
                <span id="mensagemErro"></span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
